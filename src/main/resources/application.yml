spring:
  servlet:
    multipart:
      # 파일 업로드 크기 제한 (기본 1MB → 20MB로 증가)
      max-file-size: 20MB
      max-request-size: 25MB

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

# CORS 허용 Origin
app:
  cors:
    allowed-origins: http://localhost:3000
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin1234}
  jwt:
    secret: ${JWT_SECRET:estaid-demo-jwt-secret-key-change-me-please-2026}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Claude API 설정
claude:
  api:
    key: ${CLAUDE_API_KEY}
    base-url: https://api.anthropic.com
    model: claude-opus-4-6
    version: 2023-06-01

# Supabase Storage 설정
supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  storage:
    bucket: images

# FAL.ai API 설정
# - image-url: FLUX Kontext [pro] - 씬 이미지 생성 (동기)
# - video-url: Wan 2.1 FLF2V - 씬 영상 생성 (비동기 큐)
fal:
  api:
    key: ${FAL_KEY}
    image-url: https://fal.run/fal-ai/flux-pro/kontext
    text-image-url: https://fal.run/fal-ai/flux-pro
    video-url: https://queue.fal.run/fal-ai/wan-flf2v
