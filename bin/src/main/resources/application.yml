# 공통 설정
spring:
  profiles:
    active: dev

server:
  port: 8080

# CORS 허용 Origin
app:
  cors:
    allowed-origins: http://localhost:3000

# Claude API 설정
claude:
  api:
    key: ${CLAUDE_API_KEY:your-claude-api-key-here}
    base-url: https://api.anthropic.com
    model: claude-opus-4-6
    version: 2023-06-01

---
# 개발 환경 (H2 인메모리 DB)
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:estaiddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

---
# 운영 환경 (MySQL)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:estaiddb}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
